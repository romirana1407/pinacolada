<!doctype html>
<meta name=viewport content="width=device-width,initial-scale=1">
<title>Corporate WiFi</title>
<style>
*{box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;margin:0;min-height:100vh;background:#f0f2f5;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.logo-bar{background:#003087;width:100%;max-width:440px;padding:18px 24px;border-radius:8px 8px 0 0;display:flex;align-items:center;gap:12px}
.logo-bar span{color:#fff;font-size:18px;font-weight:700;letter-spacing:.5px}
.box{background:#fff;width:100%;max-width:440px;padding:32px 28px;border-radius:0 0 8px 8px;box-shadow:0 4px 20px #0002}
h2{margin:0 0 6px;color:#1a1a1a;font-size:18px}
p{color:#666;font-size:13px;margin:0 0 22px}
label{display:block;font-size:12px;color:#555;margin-bottom:4px;margin-top:14px;font-weight:600}
input{display:block;width:100%;padding:11px 12px;border:1px solid #ccc;border-radius:4px;font-size:14px;outline:none}
input:focus{border-color:#003087;box-shadow:0 0 0 2px #00308720}
button{width:100%;padding:12px;background:#003087;color:#fff;border:0;border-radius:4px;font-size:14px;font-weight:600;cursor:pointer;margin-top:22px}
button:hover{background:#002060}
.info{font-size:11px;color:#999;margin-top:16px;text-align:center}
</style>
<div class=logo-bar>
<span>&#127970; CorporateNet &mdash; Portal de acceso</span>
</div>
<div class=box>
<h2>Acceso a la red corporativa</h2>
<p>Introduce tus credenciales de empresa para conectarte.</p>
<form method=POST action=/login>
<label>Usuario (email corporativo)</label>
<input name=username placeholder="nombre@empresa.com" type=email required>
<label>Contrase&ntilde;a</label>
<input name=password placeholder="Contrase&ntilde;a" type=password required>
<button type=submit>Iniciar sesi&oacute;n</button>
</form>
<p class=info>&#128274; Conexi&oacute;n cifrada &middot; Uso exclusivo empleados &middot; IT Support: ext. 1234</p>
</div>
